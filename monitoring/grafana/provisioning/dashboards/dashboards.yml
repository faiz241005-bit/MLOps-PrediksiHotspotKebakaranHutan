# =============================================================================
# Grafana dashboard provisioning
# =============================================================================
# Path ini akan di-scan saat Grafana start. Tiap file .json di-load otomatis.
# =============================================================================

apiVersion: 1

providers:
  - name: "FireGuard Dashboards"
    orgId: 1
    folder: "FireGuard"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30   # reload kalau JSON berubah (dev convenience)
    allowUiUpdates: true        # user boleh edit lewat UI (lalu export ulang)
    options:
      path: /etc/grafana/dashboards
