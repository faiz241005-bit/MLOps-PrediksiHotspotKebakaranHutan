# =============================================================================
# FireGuard — Docker Compose orchestration (LK09 + LK10)
# =============================================================================
# Dua service (4 container total dengan replicas):
#   1. mlflow-server         : MLflow Tracking + Model Registry (sqlite backend)
#   2. mlflow-model-server   : MLflow native serving (REPLICATED x3, LK10)
#                              Built via `mlflow models build-docker`
#
# Network:
#   fireguard-net (custom bridge) — service discovery via nama service
#
# Volumes (named):
#   mlflow-db        — sqlite database (metadata: experiments, runs, registry)
#   mlflow-artifacts — model artifacts (.pkl, model.yaml, dll)
#
# Quick start:
#   # Pre-step: build MLflow model image (sekali saja, di Codespace)
#   export MLFLOW_TRACKING_URI=http://localhost:5000
#   mlflow models build-docker \
#     --model-uri "models:/fireguard-regressor/Production" \
#     --name fireguard/mlflow-model-server:1.0 \
#     --env-manager local
#
#   # Lalu jalankan stack
#   docker compose up -d
#   docker compose ps                  # cek status (4 container, semua healthy)
#
# Dynamic scaling (LK10):
#   docker compose up -d --scale mlflow-model-server=5    # 5 replicas
#   docker compose up -d --scale mlflow-model-server=1    # back to 1
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # mlflow-server — Tracking + Registry
  # ---------------------------------------------------------------------------
  mlflow-server:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: fireguard/mlflow-server:1.0
    container_name: fireguard-mlflow
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow/db
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ---------------------------------------------------------------------------
  # mlflow-model-server — MLflow native serving (LK10)
  # ---------------------------------------------------------------------------
  # Image dibuat dengan:
  #   mlflow models build-docker \
  #     --model-uri "models:/fireguard-regressor/Production" \
  #     --name fireguard/mlflow-model-server:1.0 \
  #     --env-manager local
  #
  # Endpoint: POST /invocations (MLflow native, BUKAN /predict)
  # Input format: {"dataframe_split": {"columns": [...], "data": [[...]]}}
  # Output format: {"predictions": [...]}
  #
  # CATATAN PENTING tentang replicas:
  #   - JANGAN set container_name (konflik dengan multiple replicas)
  #   - Port range "8010-8012:8080" → 3 host ports ke port 8080 di tiap container
  #   - Tiap replica naming otomatis: <project>_mlflow-model-server_1/2/3
  # ---------------------------------------------------------------------------
  mlflow-model-server:
    image: fireguard/mlflow-model-server:1.0
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "8010-8012:8080"
    depends_on:
      mlflow-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      # ── LK10 KEY REQUIREMENT: 3 replicas ─────────────────────────────────
      replicas: 3
      resources:
        limits:
          memory: 800m
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # streamlit-dashboard — Folium map UI dengan REST API /invocations
  # ---------------------------------------------------------------------------
  # Connect ke mlflow-model-server via service DNS (round-robin antar replicas).
  # Mount data/raw/firms read-only untuk peta hotspot historis.
  # ---------------------------------------------------------------------------
  streamlit-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: fireguard/streamlit-dashboard:1.0
    container_name: fireguard-dashboard
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "8501:8501"
    environment:
      # Service discovery: pakai nama service "mlflow-model-server".
      # Docker Compose DNS otomatis round-robin antar 3 replicas.
      FIREGUARD_API_URL: "http://mlflow-model-server:8080"
    volumes:
      - ./data/raw/firms:/app/data/raw/firms:ro
    depends_on:
      mlflow-model-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

# ---------------------------------------------------------------------------
# Custom bridge network — service discovery via DNS internal Compose
# ---------------------------------------------------------------------------
networks:
  fireguard-net:
    name: fireguard-net
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes — persisten antar `docker compose down/up` (kecuali `-v`)
# ---------------------------------------------------------------------------
volumes:
  mlflow-db:
    name: fireguard-mlflow-db
  mlflow-artifacts:
    name: fireguard-mlflow-artifacts
