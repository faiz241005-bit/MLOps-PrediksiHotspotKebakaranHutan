# =============================================================================
# FireGuard — Docker Compose orchestration (LK09 + LK10 + LK11)
# =============================================================================
# Service map (7 container saat replicas=3):
#   1. mlflow-server         : MLflow Tracking + Model Registry (sqlite)
#   2. mlflow-model-server   : MLflow native serving (REPLICATED x3, LK10)
#   3. streamlit-dashboard   : Folium UI (call proxy, BUKAN langsung ke MLflow)
#   4. metrics-proxy         : FastAPI sidecar → expose /metrics (LK11)
#   5. prometheus            : scrape metrics-proxy + cadvisor (LK11)
#   6. grafana               : dashboard visualization (LK11)
#   7. cadvisor              : container CPU/RAM exporter (LK11)
#
# Network:
#   fireguard-net (custom bridge) — service discovery via nama service
#
# Volumes (named):
#   mlflow-db        — sqlite database
#   mlflow-artifacts — model artifacts
#   prometheus-data  — TSDB metrics (15d retention)
#   grafana-data     — dashboard config & user prefs
#
# Quick start:
#   # Pre-step: build MLflow model image (sekali saja)
#   export MLFLOW_TRACKING_URI=http://localhost:5000
#   mlflow models build-docker \
#     --model-uri "models:/fireguard-regressor/Production" \
#     --name fireguard/mlflow-model-server:1.0 \
#     --env-manager local
#
#   docker compose up -d
#   docker compose ps                  # cek status (7 container, semua healthy)
#
# Dynamic scaling (LK10):
#   docker compose up -d --scale mlflow-model-server=5
#
# Akses UI:
#   - MLflow      : http://localhost:5000
#   - Streamlit   : http://localhost:8501
#   - Grafana     : http://localhost:3000  (admin/admin — ganti di production!)
#   - Prometheus  : http://localhost:9090
#   - cAdvisor    : http://localhost:8085  (opsional, untuk debug)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # mlflow-server — Tracking + Registry
  # ---------------------------------------------------------------------------
  mlflow-server:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: fireguard/mlflow-server:1.0
    container_name: fireguard-mlflow
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow/db
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ---------------------------------------------------------------------------
  # mlflow-model-server — MLflow native serving (LK10)
  # ---------------------------------------------------------------------------
  # CATATAN: TIDAK di-expose ke host langsung untuk LK11. Akses melalui
  # metrics-proxy. Tapi tetap kita expose ports 8010-8012 untuk backward
  # compatibility (debugging & LK10 demo).
  # ---------------------------------------------------------------------------
  mlflow-model-server:
    image: fireguard/mlflow-model-server:1.0
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "8010-8012:8080"
    depends_on:
      mlflow-server:
        condition: service_healthy
    healthcheck:
      # Image MLflow tidak punya curl → pakai python urllib
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/ping', timeout=3).read(); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 800m
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # metrics-proxy — FastAPI sidecar (LK11)
  # ---------------------------------------------------------------------------
  # Expose:
  #   /invocations  → forward ke mlflow-model-server (Docker DNS round-robin)
  #   /ping, /health
  #   /metrics      → Prometheus exposition (latency, RPS, prediction value)
  # ---------------------------------------------------------------------------
  metrics-proxy:
    build:
      context: .
      dockerfile: Dockerfile.metrics-proxy
    image: fireguard/metrics-proxy:1.0
    container_name: fireguard-metrics-proxy
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "9000:9000"
    environment:
      MLFLOW_UPSTREAM_URL: "http://mlflow-model-server:8080"
      UPSTREAM_TIMEOUT_S: "15"
      MAX_BODY_BYTES: "10485760"   # 10 MiB
      LOG_LEVEL: "INFO"
    depends_on:
      mlflow-model-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m

  # ---------------------------------------------------------------------------
  # streamlit-dashboard — Folium map UI
  # ---------------------------------------------------------------------------
  # Connect ke metrics-proxy (bukan langsung ke mlflow-model-server) supaya
  # tiap call tercatat di Prometheus.
  # ---------------------------------------------------------------------------
  streamlit-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: fireguard/streamlit-dashboard:1.0
    container_name: fireguard-dashboard
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "8501:8501"
    environment:
      # LK11: pakai metrics-proxy (bukan langsung mlflow-model-server)
      FIREGUARD_API_URL: "http://metrics-proxy:9000"
    volumes:
      - ./data/raw/firms:/app/data/raw/firms:ro
    depends_on:
      metrics-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # prometheus — TSDB + scraper (LK11)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fireguard-prometheus
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"          # /-/reload via HTTP POST
    depends_on:
      metrics-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # grafana — dashboard UI (LK11)
  # ---------------------------------------------------------------------------
  # Default credentials: admin/admin (sesuai permintaan).
  # SECURITY NOTE: GANTI di production via env GF_SECURITY_ADMIN_PASSWORD
  # atau --env-file. Default creds = risk besar kalau diakses publik.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: fireguard-grafana
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "3000:3000"
    environment:
      # ⚠️ Default admin/admin — GANTI sebelum deploy production
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      # Anonymous viewer off (tetap perlu login)
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Disable signup public
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Reduce noise
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # cadvisor — container resource exporter (LK11)
  # ---------------------------------------------------------------------------
  # Membaca cgroups + Docker socket → expose CPU/RAM/IO per container.
  # Read-only access ke Docker socket (untuk metadata discovery).
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: fireguard-cadvisor
    restart: unless-stopped
    networks:
      - fireguard-net
    ports:
      - "8085:8080"
    privileged: false
    # cAdvisor butuh akses cgroups & docker socket (read-only)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--housekeeping_interval=10s"
      - "--docker_only=true"          # hanya monitor container, bukan host
      - "--store_container_labels=false"  # reduce label cardinality
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    # NOTE: cAdvisor butuh akses ke /proc dan /sys host → no-new-privileges
    # tetap aman karena dia tidak escalate, hanya read.
    security_opt:
      - no-new-privileges:true

# ---------------------------------------------------------------------------
# Custom bridge network
# ---------------------------------------------------------------------------
networks:
  fireguard-net:
    name: fireguard-net
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes — persisten antar `docker compose down/up`
# ---------------------------------------------------------------------------
volumes:
  mlflow-db:
    name: fireguard-mlflow-db
  mlflow-artifacts:
    name: fireguard-mlflow-artifacts
  prometheus-data:
    name: fireguard-prometheus-data
  grafana-data:
    name: fireguard-grafana-data
