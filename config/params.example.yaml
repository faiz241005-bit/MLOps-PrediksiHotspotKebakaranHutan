# =============================================================================
# FireGuard — Hyperparameters & Pipeline Config (TEMPLATE / EXAMPLE)
# =============================================================================
# Copy file ini ke params.yaml sebelum dipakai:
#   cp config/params.example.yaml config/params.yaml
#
# File params.yaml asli TIDAK di-commit (sudah di .gitignore via pattern).
# =============================================================================

data:
  provinces:
    - id: kalteng
      name: "Kalimantan Tengah"
      bbox: [-3.5, 110.5, 1.5, 116.5]   # [lat_min, lon_min, lat_max, lon_max]
    - id: kalbar
      name: "Kalimantan Barat"
      bbox: [-3.0, 108.0, 2.5, 118.0]
    - id: riau
      name: "Riau"
      bbox: [0.0, 100.0, 4.5, 106.5]
    - id: sumsel
      name: "Sumatera Selatan"
      bbox: [-5.5, 102.0, -1.0, 108.5]
    - id: jambi
      name: "Jambi"
      bbox: [-3.0, 101.0, -0.5, 105.0]

  api:
    firms:
      base_url: "https://firms.modaps.eosdis.nasa.gov/api/area/csv"
      sensor: "VIIRS_SNPP_NRT"
      day_range: 2
      timeout_seconds: 30
      max_retries: 3
    open_meteo:
      base_url: "https://api.open-meteo.com/v1/forecast"
      timeout_seconds: 30

features:
  # Daily aggregation per (province_id, date). Rolling windows dalam HARI.
  rolling_windows_days: [1, 3, 7]
  # Lag features (kemarin, 3 hari, 1 minggu)
  lag_windows_days: [1, 3, 7]
  # Features yang dimonitor untuk drift detection (PSI / KS test)
  drift_features:
    - hotspot_count
    - frp_mean
    - precipitation_sum
    - relative_humidity_2m_mean
    - days_since_rain

continual_training:
  schedule:
    seasonal_cron:
      - "0 0 1 4 *"    # 1 April pukul 00:00 UTC
      - "0 0 1 11 *"   # 1 November pukul 00:00 UTC
  thresholds:
    psi: 0.2
    rmse_increase_pct: 20
    event_hotspot_per_day: 500
  sliding_window_days:
    kemarau: 90
    hujan: 60
  min_samples: 500

model:
  lightgbm_regressor:
    objective: "regression_l1"
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 8
    num_leaves: 31
    min_child_samples: 20
    reg_alpha: 0.1
    reg_lambda: 0.1
    random_state: 42
    n_jobs: -1
  lightgbm_classifier:
    objective: "multiclass"
    num_class: 3
    n_estimators: 400
    learning_rate: 0.05
    max_depth: 6
    class_weight: "balanced"   # class Bahaya minoritas
    random_state: 42
    n_jobs: -1

evaluation:
  holdout_days: 14
  shadow_deployment_hours: 48
  baseline_mae_per_province: 8.0  # target dari LK01

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
