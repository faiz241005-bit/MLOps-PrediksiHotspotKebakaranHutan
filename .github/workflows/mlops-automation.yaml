name: MLOps Automation Pipeline (LK08)

# ============================================================================
# Code as Trigger — setiap push ke main atau PR akan men-trigger:
#   Job 1: Automated Testing (pytest)
#   Job 2: Automated Training (build_features + train.py + synthetic fallback)
#   Job 3: Model Evaluation & Validation (threshold dari LK01)
#   Job 4: Auto-Registry update (kalau lolos validasi → register stage Staging)
# ============================================================================

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LK0*.docx'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:   # manual trigger via GitHub UI

permissions:
  contents: read   # least privilege — hanya baca repo

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "file:./mlruns"

jobs:
  # ==========================================================================
  # JOB 1 — Automated Testing
  # ==========================================================================
  test:
    name: "1) Automated Testing"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: 1

  # ==========================================================================
  # JOB 2 — Automated Training
  # ==========================================================================
  train:
    name: "2) Automated Training"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    # Catatan: MinIO service container dihapus karena tag image instabil di
    # Actions runner (Docker pull rate-limited). Workflow tetap demonstrate
    # automated training via synthetic data generator (CI fallback).
    # Production upgrade: setup DVC remote di Cloudflare R2/Backblaze B2/AWS S3
    # lalu replace step "Generate synthetic features" dengan 'dvc pull data/features'.

    outputs:
      run_id: ${{ steps.train_step.outputs.run_id }}
      experiment_name: ${{ steps.train_step.outputs.experiment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic features (CI fallback for DVC remote)
        # Kalau real DVC remote tersedia, ganti step ini dengan 'dvc pull'.
        # Untuk demo akademik, synthetic data demonstrate workflow tanpa
        # bergantung pada cloud storage berbayar.
        run: |
          mkdir -p data/features data/processed
          python -m src.utils.synthetic_data --n-provinces 5 --n-days 60 --seed 42
          ls -la data/features/

      - name: Train model
        id: train_step
        run: |
          OUTPUT=$(python -m src.models.train \
            --algorithm regressor \
            --learning-rate 0.05 \
            --n-estimators 200 \
            --max-depth 6 \
            --experiment-name fireguard-ct-ci 2>&1)
          echo "$OUTPUT"
          RUN_ID=$(echo "$OUTPUT" | grep -oE "Run ID: [a-f0-9]+" | head -1 | awk '{print $3}')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "experiment_name=fireguard-ct-ci" >> $GITHUB_OUTPUT
          echo "::notice::Training complete. Run ID: $RUN_ID"

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 30

  # ==========================================================================
  # JOB 3 — Model Evaluation & Validation
  # ==========================================================================
  evaluate:
    name: "3) Model Evaluation & Validation"
    runs-on: ubuntu-latest
    needs: train
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Evaluate against threshold (LK01)
        id: eval_step
        run: |
          python -m src.models.evaluate \
            --run-id "${{ needs.train.outputs.run_id }}" \
            --ci-mode \
            --output-json eval_result.json
          echo "::notice::Evaluation passed thresholds"

      - name: Upload eval result
        uses: actions/upload-artifact@v4
        with:
          name: eval_result
          path: eval_result.json
          retention-days: 30

  # ==========================================================================
  # JOB 4 — Auto-Registry Update (kalau lolos validasi)
  # ==========================================================================
  register:
    name: "4) Auto-Registry Update"
    runs-on: ubuntu-latest
    needs: [train, evaluate]
    if: success()   # hanya run kalau Job 1-3 sukses
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Register model + transition to Staging
        run: |
          python -m src.models.registry promote-best \
            --model fireguard-regressor \
            --experiment fireguard-ct-ci \
            --metric rmse \
            --target-stage Staging
          echo "::notice::Model registered as fireguard-regressor (Staging)"

      - name: Upload updated mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns_after_register
          path: mlruns/
          retention-days: 30

  # ==========================================================================
  # JOB 5 — Workflow Summary
  # ==========================================================================
  summary:
    name: "5) Workflow Summary"
    runs-on: ubuntu-latest
    needs: [test, train, evaluate, register]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## FireGuard MLOps Pipeline — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 1) Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2) Train | ${{ needs.train.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3) Evaluate | ${{ needs.evaluate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4) Register | ${{ needs.register.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }} on \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
