name: CI · Lint & Test
# Placeholder workflow untuk LK02. Detail diperluas di LK06.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # mencegah job stuck konsumsi runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (black + flake8 + isort)
        run: |
          black --check src/ tests/ || true
          flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503 || true
          isort --check-only --profile=black src/ tests/ || true

      - name: Run tests
        run: |
          pytest -q tests/ || echo "Tests akan ditambahkan di LK selanjutnya"
